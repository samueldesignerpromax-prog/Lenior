<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENIOR - Seu Assistente IA</title>
    <style>
        /* ===== RESET E CORPO ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0e17;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .jarvis-container {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            background: rgba(10, 14, 23, 0.9);
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.05), inset 0 0 60px rgba(0, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        /* ===== CABEÇALHO ===== */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 255, 255, 0.02);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #00ffff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .status {
            margin-left: auto;
            font-size: 12px;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; box-shadow: 0 0 5px rgba(0,255,204,0.1); }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
            100% { opacity: 0.6; box-shadow: 0 0 5px rgba(0,255,204,0.1); }
        }

        /* ===== ÁREA DE MENSAGENS ===== */
        .chat-area {
            flex: 1;
            padding: 25px 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Barra de rolagem personalizada */
        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.02);
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.3);
            border-radius: 10px;
        }

        /* ===== BOLHAS DE MENSAGEM ===== */
        .mensagem {
            max-width: 80%;
            padding: 14px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mensagem.usuario {
            align-self: flex-end;
            background: linear-gradient(135deg, #003366, #001a33);
            color: #b0e0ff;
            border: 1px solid rgba(0, 100, 255, 0.3);
            border-bottom-right-radius: 5px;
        }

        .mensagem.lenior {
            align-self: flex-start;
            background: rgba(0, 255, 255, 0.05);
            color: #d0f0f0;
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-bottom-left-radius: 5px;
        }

        .mensagem.lenior.codigo {
            background: #0d1117;
            border: 1px solid #00ffaa33;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-width: 95%;
            color: #00ffaa;
            box-shadow: 0 0 30px rgba(0, 255, 170, 0.05);
        }

        .mensagem.lenior.codigo::before {
            content: "💻 CÓDIGO";
            display: block;
            font-size: 10px;
            color: #00ffaa88;
            margin-bottom: 8px;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== BOTÃO DE CONFIRMAR COMANDO ===== */
        .btn-confirmar {
            background: #ff4400;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(255, 68, 0, 0.3);
        }
        .btn-confirmar:hover {
            transform: scale(1.05);
            background: #ff6600;
            box-shadow: 0 0 40px rgba(255, 68, 0, 0.5);
        }

        /* ===== INDICADOR DE DIGITAÇÃO ===== */
        .digitando {
            align-self: flex-start;
            color: #00ffcc88;
            font-size: 14px;
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 255, 0.05);
            display: none;
        }
        .digitando span {
            animation: blink 1.2s infinite;
        }
        .digitando span:nth-child(2) { animation-delay: 0.2s; }
        .digitando span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ===== RODAPÉ (INPUT) ===== */
        .input-area {
            padding: 20px 30px;
            border-top: 1px solid rgba(0, 255, 255, 0.05);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.3);
        }

        .input-area input {
            flex: 1;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            background: rgba(0, 255, 255, 0.02);
            color: #d0f0f0;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-area input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.05);
        }

        .input-area input::placeholder {
            color: #3a5a6a;
        }

        .input-area button {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #00ccff, #0088ff);
            color: #0a0e17;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            box-shadow: 0 0 30px rgba(0, 136, 255, 0.2);
        }

        .input-area button:hover {
            transform: scale(1.03);
            box-shadow: 0 0 50px rgba(0, 136, 255, 0.4);
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 600px) {
            .header { padding: 15px; }
            .logo { font-size: 20px; }
            .chat-area { padding: 15px; }
            .mensagem { max-width: 95%; font-size: 14px; }
            .input-area { padding: 15px; flex-wrap: wrap; }
            .input-area input { flex: 1 1 100%; }
            .input-area button { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

    <div class="jarvis-container">
        <!-- CABEÇALHO -->
        <div class="header">
            <div class="logo">⚡ LENIOR</div>
            <div class="status">● ONLINE</div>
        </div>

        <!-- ÁREA DO CHAT -->
        <div class="chat-area" id="chatArea">
            <!-- Mensagem de boas-vindas -->
            <div class="mensagem lenior">
                Olá! Sou o <strong>LENIOR</strong>. Posso conversar, gerar códigos e executar comandos no seu PC. 
                Como posso ajudá-lo hoje?
            </div>
            
            <!-- Indicador de digitação -->
            <div class="digitando" id="digitando">
                LENIOR <span>.</span><span>.</span><span>.</span>
            </div>
        </div>

        <!-- RODAPÉ (INPUT) -->
        <div class="input-area">
            <input type="text" id="inputMensagem" placeholder="Digite sua mensagem..." autofocus>
            <button id="btnEnviar">➤ ENVIAR</button>
        </div>
    </div>

    <script>
        // ===== ELEMENTOS =====
        const chatArea = document.getElementById('chatArea');
        const inputMsg = document.getElementById('inputMensagem');
        const btnEnviar = document.getElementById('btnEnviar');
        const digitando = document.getElementById('digitando');

        // ===== FUNÇÃO PARA ADICIONAR MENSAGEM =====
        function adicionarMensagem(texto, tipo, extra = null) {
            // Remove o "digitando" se estiver visível
            digitando.style.display = 'none';

            const div = document.createElement('div');
            div.classList.add('mensagem');

            if (tipo === 'usuario') {
                div.classList.add('usuario');
                div.textContent = texto;
            } else if (tipo === 'lenior') {
                div.classList.add('lenior');
                div.textContent = texto;
            } else if (tipo === 'codigo') {
                div.classList.add('lenior', 'codigo');
                div.textContent = texto;
            } else if (tipo === 'comando') {
                div.classList.add('lenior');
                // texto é a pergunta de confirmação
                div.innerHTML = `
                    ${texto}
                    <br>
                    <button class="btn-confirmar" data-comando="${extra}">✅ SIM, EXECUTAR</button>
                    <button class="btn-confirmar" style="background:#333;margin-left:10px;" onclick="this.parentElement.remove()">❌ CANCELAR</button>
                `;
                // Adiciona evento ao botão de confirmar (delegação)
                setTimeout(() => {
                    div.querySelector('.btn-confirmar')?.addEventListener('click', function() {
                        const cmd = this.getAttribute('data-comando');
                        executarComando(cmd);
                        this.parentElement.remove(); // Remove a mensagem de confirmação
                    });
                }, 50);
            }

            chatArea.appendChild(div);
            // Rola para o final
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ===== EXECUTAR COMANDO (após confirmação) =====
        async function executarComando(comando) {
            adicionarMensagem(`⏳ Executando: "${comando}" ...`, 'lenior');
            
            try {
                const resp = await fetch('/api/executar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comando: comando })
                });
                const dados = await resp.json();
                
                let resultado = dados.resultado || 'Comando finalizado.';
                if (dados.erro) resultado = '❌ ' + dados.erro;
                
                adicionarMensagem(`📟 Resultado:\n${resultado}`, 'lenior');
            } catch (e) {
                adicionarMensagem(`❌ Falha ao conectar ao servidor: ${e}`, 'lenior');
            }
        }

        // ===== ENVIAR MENSAGEM =====
        async function enviarMensagem() {
            const texto = inputMsg.value.trim();
            if (!texto) return;

            // Mostra mensagem do usuário
            adicionarMensagem(texto, 'usuario');
            inputMsg.value = '';
            inputMsg.focus();

            // Mostra "digitando..."
            digitando.style.display = 'block';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const resp = await fetch('/api/lenior', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagem: texto })
                });
                const dados = await resp.json();

                // Esconde "digitando..."
                digitando.style.display = 'none';

                if (dados.erro) {
                    adicionarMensagem(`❌ Erro: ${dados.erro}`, 'lenior');
                    return;
                }

                // Verifica o tipo de resposta
                if (dados.tipo === 'codigo') {
                    adicionarMensagem(dados.resposta, 'codigo');
                } else if (dados.tipo === 'comando' && dados.comando) {
                    // Mostra mensagem de confirmação
                    adicionarMensagem(dados.resposta, 'comando', dados.comando);
                } else {
                    adicionarMensagem(dados.resposta, 'lenior');
                }

            } catch (e) {
                digitando.style.display = 'none';
                adicionarMensagem(`❌ Erro de conexão: ${e}`, 'lenior');
            }
        }

        // ===== EVENTOS =====
        btnEnviar.addEventListener('click', enviarMensagem);
        inputMsg.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarMensagem();
        });

        // Foco inicial
        inputMsg.focus();
    </script>

</body>
</html>
