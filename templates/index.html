<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENIOR · IA Assistente</title>
    <style>
        /* ======= RESET E FONTES ======= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #080c14;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 96%;
            max-width: 1000px;
            height: 92vh;
            background: #0e141f;
            border-radius: 28px;
            border: 1px solid #1a2a3a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(0, 180, 255, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ======= CABEÇALHO ======= */
        .header {
            padding: 18px 28px;
            background: rgba(0, 180, 255, 0.03);
            border-bottom: 1px solid #1a2a3a;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #0070ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
        }

        .status {
            font-size: 12px;
            color: #4ae0c0;
            background: rgba(0, 255, 200, 0.08);
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 200, 0.15);
            letter-spacing: 1px;
            animation: pulse-status 2s infinite;
        }
        @keyframes pulse-status {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .badge-provedor {
            margin-left: auto;
            font-size: 11px;
            color: #8899aa;
            background: #1a2535;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid #2a3a4a;
        }

        /* ======= CHAT ======= */
        .chat {
            flex: 1;
            padding: 20px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat::-webkit-scrollbar { width: 4px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb { background: #2a4a6a; border-radius: 10px; }

        /* Mensagens */
        .msg {
            max-width: 82%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fade-up 0.25s ease;
            position: relative;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #003f7f, #001f3f);
            color: #c0e0ff;
            border: 1px solid #0050a0;
            border-bottom-right-radius: 4px;
        }

        .msg.lenior {
            align-self: flex-start;
            background: #121c2c;
            color: #d0e8f0;
            border: 1px solid #1a3045;
            border-bottom-left-radius: 4px;
        }

        .msg.lenior.code {
            background: #0b111a;
            border-color: #00ccaa44;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            color: #a0f0d0;
            max-width: 94%;
            box-shadow: 0 0 30px rgba(0, 200, 170, 0.03);
        }
        .msg.lenior.code::before {
            content: "💻 CÓDIGO";
            display: block;
            font-family: 'Segoe UI', sans-serif;
            font-size: 10px;
            color: #4ae0c0aa;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .msg.lenior .comando-btn {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-confirm {
            background: #ff5500;
            color: #fff;
            border: none;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px #ff550044;
        }
        .btn-confirm:hover { transform: scale(1.04); background: #ff7700; }
        .btn-cancel {
            background: #2a3a4a;
            color: #ccc;
            border: none;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-cancel:hover { background: #3a4a5a; }

        /* Indicador de digitação */
        .typing {
            align-self: flex-start;
            color: #4ae0c088;
            font-size: 14px;
            padding: 6px 20px;
            background: #0e1a2a;
            border-radius: 40px;
            border: 1px solid #1a3045;
            display: none;
        }
        .typing span { animation: blink 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ======= INPUT ======= */
        .input-area {
            padding: 16px 28px 22px;
            border-top: 1px solid #1a2a3a;
            background: #0a121e;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            padding: 14px 22px;
            border-radius: 60px;
            border: 1px solid #1a3045;
            background: #0d1828;
            color: #d0e8f0;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            min-width: 160px;
        }
        .input-area input:focus {
            border-color: #00aaff;
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.05);
        }
        .input-area input::placeholder { color: #3a5a6a; }
        .input-area button {
            padding: 14px 36px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(90deg, #00bbff, #0066ff);
            color: #0a0e17;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.5px;
            box-shadow: 0 0 30px #0066ff33;
        }
        .input-area button:hover {
            transform: scale(1.04);
            box-shadow: 0 0 50px #0066ff66;
        }

        @media (max-width: 600px) {
            .header { padding: 12px 16px; }
            .logo { font-size: 20px; }
            .chat { padding: 14px; }
            .msg { max-width: 96%; font-size: 14px; }
            .input-area { padding: 12px 16px 18px; }
            .input-area input { flex: 1 1 100%; }
            .input-area button { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">⚡ LENIOR</div>
        <div class="status">● online</div>
        <span class="badge-provedor" id="providerBadge">API</span>
    </div>

    <div class="chat" id="chat">
        <div class="msg lenior">
            Olá, sou o <strong>LENIOR</strong>. Posso conversar, gerar código e executar comandos no seu PC. Como posso ajudar?
        </div>
        <div class="typing" id="typing">LENIOR<span>.</span><span>.</span><span>.</span></div>
    </div>

    <div class="input-area">
        <input type="text" id="inputMsg" placeholder="Digite sua mensagem..." autofocus>
        <button id="sendBtn">➤ ENVIAR</button>
    </div>
</div>

<script>
    (function() {
        const chat = document.getElementById('chat');
        const input = document.getElementById('inputMsg');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');

        // Mostra o provedor (opcional)
        fetch('/api/historico')
            .then(r => r.json())
            .catch(() => {});

        function addMessage(text, type, extra = null) {
            typing.style.display = 'none';

            const div = document.createElement('div');
            div.className = 'msg';

            if (type === 'user') {
                div.classList.add('user');
                div.textContent = text;
            } else if (type === 'lenior') {
                div.classList.add('lenior');
                div.textContent = text;
            } else if (type === 'code') {
                div.classList.add('lenior', 'code');
                div.textContent = text;
            } else if (type === 'command') {
                div.classList.add('lenior');
                div.innerHTML = `
                    ${text}
                    <div class="comando-btn">
                        <button class="btn-confirm" data-cmd="${extra}">✅ Sim, executar</button>
                        <button class="btn-cancel" onclick="this.closest('.msg').remove()">✖ Cancelar</button>
                    </div>
                `;
                // Adiciona evento ao botão de confirmar
                setTimeout(() => {
                    const confirmBtn = div.querySelector('.btn-confirm');
                    if (confirmBtn) {
                        confirmBtn.addEventListener('click', function(e) {
                            const cmd = this.getAttribute('data-cmd');
                            executarComando(cmd);
                            const msgDiv = this.closest('.msg');
                            if (msgDiv) msgDiv.remove();
                        });
                    }
                }, 50);
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function executarComando(comando) {
            addMessage(`⏳ Executando: "${comando}" ...`, 'lenior');
            try {
                const resp = await fetch('/api/executar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comando })
                });
                const data = await resp.json();
                const resultado = data.resultado || 'Comando finalizado.';
                addMessage(`📟 Resultado:\n${resultado}`, 'lenior');
            } catch (e) {
                addMessage(`❌ Erro ao executar: ${e}`, 'lenior');
            }
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            input.focus();

            typing.style.display = 'block';
            chat.scrollTop = chat.scrollHeight;

            try {
                const resp = await fetch('/api/lenior', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagem: text })
                });
                const data = await resp.json();
                typing.style.display = 'none';

                if (data.erro) {
                    addMessage(`❌ ${data.erro}`, 'lenior');
                    return;
                }

                if (data.tipo === 'codigo') {
                    addMessage(data.resposta, 'code');
                } else if (data.tipo === 'comando' && data.comando) {
                    addMessage(data.resposta, 'command', data.comando);
                } else {
                    addMessage(data.resposta, 'lenior');
                }
            } catch (e) {
                typing.style.display = 'none';
                addMessage(`❌ Erro de conexão: ${e}`, 'lenior');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        input.focus();
    })();
</script>
</body>
</html>
